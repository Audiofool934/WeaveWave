# @package __global__

# Configuration for WeaveWave MusicGen-Style training at 32kHz sample rate
defaults:
  - override /solver: musicgen/musicgen_style_32khz
  - override /conditioner: style2music
  - override /dset: audio/default
  - _self_

# Mixed-precision training
autocast: true
autocast_dtype: float16

# Audio codec: EnCodec at 32kHz
compression_model_checkpoint: //pretrained/facebook/encodec_32khz

channels: 1
sample_rate: 32000

# Deadlock detection
deadlock:
  use: true

# Dataset configuration
dataset:
  batch_size: 8  # adjust based on GPU memory
  sample_on_weight: false
  sample_on_duration: false
  train:
    paths: ["data/multimodal_music_dataset/train"]
    merge_text_p: 0.25
    drop_desc_p: 0.5
    drop_other_p: 0.5
  valid:
    paths: ["data/multimodal_music_dataset/valid"]
  evaluate:
    paths: ["data/multimodal_music_dataset/test"]
  shuffle: true

# Generation parameters
generate:
  lm:
    use_sampling: true
    top_k: 250
    top_p: 0.0
    cfg_coef: 3.0
    cfg_coef_beta: 5.0

# Optimizer
optim:
  epochs: 100
  optimizer: adamw
  lr: 1e-4
  ema:
    use: true
    updates: 10
    device: cuda

# Logging
logging:
  log_tensorboard: true

# Learning-rate schedule
schedule:
  lr_scheduler: cosine
  cosine:
    warmup: 2000
    lr_min_ratio: 0.0
    cycle_length: 1.0

# Model scale (options: small, medium, large)
model:
  lm:
    model_scale: small
