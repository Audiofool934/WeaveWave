# @package __global__

# MusicGen model architecture configuration
model:
  # Language model (transformer decoder)
  lm:
    model_type: transformer
    model_scale: small  # options: small, medium, large
    # Dimension settings per scale
    small:
      dim: 768
      heads: 12
      layers: 24
    medium:
      dim: 1024
      heads: 16
      layers: 32
    large:
      dim: 1536
      heads: 24
      layers: 48
    # Attention
    attn_head_dim: 64
    attn_temp: 1.0
    # I/O configuration
    max_duration: 30  # maximum generation duration (seconds)
    n_q: 8  # number of quantizers (codebooks) in EnCodec
    context_len: 1024
    vocab_size: 2048  # EnCodec codebook size

# Conditioning (style + text)
# References audiocraft/config/conditioner/style2music.yaml
conditioner:
  # Classifier-free guidance
  classifier_free_guidance:
    training_dropout: 0.1
    inference_coef: 3.0

  # Attribute dropout
  attribute_dropout:
    args:
      active_on_eval: false
    text:
      description: 0.4
    wav:
      self_wav: 0.4

  # Fuser
  fuser:
    cross_attention_pos_emb: false
    cross_attention_pos_emb_scale: 1
    sum: []
    prepend: [self_wav, description]
    cross: []
    input_interpolate: []

  # Conditioners
  conditioners:
    # Audio style conditioner (MERT-based)
    self_wav:
      model: style
      style:
        model_name: mert
        transformer_scale: default
        sample_rate: ${sample_rate}
        encodec_checkpoint: '//pretrained/facebook/encodec_32khz'
        encodec_n_q: 3
        length: 3.0
        ds_factor: 15  # MERT runs at 75Hz; 75/15 = 5Hz representation
        n_q_out: 6
        eval_q: 3
        q_dropout: true
        bins: 1024
        varying_lengths: [1.5, 4.5]
        batch_norm: true
        compute_mask: true
        num_codebooks_lm: ${model.lm.n_q}
        ds_rate_compression: 640
        use_middle_of_segment: false
        rvq_threshold_ema_dead_code: 0.1

    # Text description conditioner (T5-base, frozen)
    description:
      model: t5
      t5:
        name: t5-base
        finetune: false
        word_dropout: 0.2
        normalize_text: false
